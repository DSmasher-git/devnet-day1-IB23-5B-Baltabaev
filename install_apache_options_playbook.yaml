---
- name: Install and Configure Apache
  hosts: webservers
  become: yes
  tasks:
    - name: Install apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Change Apache port to 8081
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen 80'
        line: 'Listen 8081'

    - name: Ensure Apache is started and enabled
      service:
        name: apache2
        state: restarted
        enabled: yes